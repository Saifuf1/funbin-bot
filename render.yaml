services:
  - type: web
    name: sales-bot-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: META_VERIFY_TOKEN
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: INSTAGRAM_PAGE_ID
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_NUMBER
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: UPI_ID
        sync: false
      - key: STORE_NAME
        sync: false

  - type: web
    name: sales-bot-admin
    env: node
    plan: free
    rootDir: admin
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false # Set this to your backend's Render URL (e.g., https://funbin-salesbot.onrender.com)
      - key: NEXT_PUBLIC_ADMIN_PASSWORD
        sync: false # Set this to your ADMIN_PASSWORD
